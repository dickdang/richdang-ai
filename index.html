:root {
  --ink: #f5f0e8;

  --mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg-deep); color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; }

body::before {
  content: '';

  background:

    linear-gradient(180deg, #0A1F3D 0%, #0A1F3D 35%, #061326 100%);
}

section, main, footer, nav { position: relative; }
main, .page-root { position: relative; z-index: 1; }

.liquid-glass {
  background: rgba(255, 255, 255, 0.015);
  background-blend-mode: luminosity;
  backdrop-filter: blur(8px) saturate(1.4);
  -webkit-backdrop-filter: blur(8px) saturate(1.4);
  border: none;
  box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.08);
  position: relative;
  overflow: hidden;
}
.liquid-glass::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  padding: 1.4px;
  background: linear-gradient(180deg,
    rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%,
    rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
    rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%

  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}

.hero-h1 { font-family: var(--serif); font-weight: 400; letter-spacing: -0.02em; line-height: 0.95; }
.hero-h1 em { font-style: italic; }

.eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mute); }

.pill { border-radius: 999px; padding: 10px 22px; font-size: 13px; font-weight: 500; color: var(--ink); cursor: pointer; border: none; transition: background .2s; }
.pill:hover { background: rgba(255,255,255,0.06); }

.cosmic-bg {
  position: absolute; inset: 0; overflow: hidden;
  background:
    radial-gradient(ellipse 50% 40% at 70% 22%, rgba(245,177,76,0.05) 0%, transparent 65%),
    radial-gradient(ellipse 55% 55% at 70% 40%, rgba(16,41,74,0.5) 0%, transparent 65%),
    linear-gradient(180deg, #0A1F3D 0%, #0A1F3D 40%, #061326 100%);
}
.cosmic-bg::before {
  content: '';
  position: absolute; inset: -10%;
  background:
    radial-gradient(circle 1px at 20% 30%, rgba(255,240,220,0.9), transparent 60%),
    radial-gradient(circle 1px at 70% 65%, rgba(255,240,220,0.7), transparent 60%),
    radial-gradient(circle 1.5px at 35% 80%, rgba(255,220,180,0.8), transparent 60%),
    radial-gradient(circle 1px at 85% 25%, rgba(255,240,220,0.6), transparent 60%),
    radial-gradient(circle 1px at 12% 60%, rgba(255,240,220,0.7), transparent 60%),
    radial-gradient(circle 1px at 58% 15%, rgba(255,240,220,0.5), transparent 60%),
    radial-gradient(circle 1.5px at 90% 80%, rgba(255,220,180,0.7), transparent 60%),
    radial-gradient(circle 1px at 45% 45%, rgba(255,240,220,0.6), transparent 60%),
    radial-gradient(circle 1px at 25% 90%, rgba(255,240,220,0.5), transparent 60%),
    radial-gradient(circle 1px at 78% 50%, rgba(255,240,220,0.7), transparent 60%);
  background-size: 600px 600px; background-repeat: repeat;
  animation: drift 60s linear infinite; opacity: 0.9;
}
.cosmic-bg::after {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 100%, rgba(255,150,80,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 50% 90%, rgba(255,200,140,0.10) 0%, transparent 70%);

}
@keyframes drift { from { transform: translate(0,0); } to { transform: translate(-300px,-150px); } }
@keyframes pulse { 0%, 100% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }

function useInView() {
  const ref = React.useRef(null);
  const [seen, setSeen] = React.useState(false);
  React.useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setSeen(true); io.disconnect(); }
    }, { threshold: 0.15, rootMargin: '-60px' });
    io.observe(ref.current);
    return () => io.disconnect();
  }, []);
  return [ref, seen];
}

function FadeUp({ as: Tag = 'div', delay = 0, className = '', children, style, ...rest }) {
  const [ref, seen] = useInView();
  return (
    <Tag ref={ref} className={`fade-up ${seen ? 'in' : ''} ${className}`}
         style={{ transitionDelay: `${delay}ms`, ...style }} {...rest}>
      {children}
    </Tag>
  );
}

    drift: `${(Math.random() - 0.5) * 80}px`, scale: 0.4 + Math.random() * 1.2, key: i,

  return (
    <div className="embers" aria-hidden>

        <span key={p.key} className="ember" style={{
          left: p.left, bottom: p.bottom, animationDelay: p.delay,

  <script type="text/babel">
const { useEffect, useRef } = React;

function Sparkles({ anchorRef = null, region = { left: 0.32, top: 0, right: 0.98, bottom: 0.28 },
  excludeRegion = null, count = 70, cursorRadius = 140, cursorStrength = 1.6, className, style }) {
  const canvasRef = useRef(null);
  const rafRef = useRef(0);
  const particlesRef = useRef([]);
  const cursorRef = useRef({ x: -9999, y: -9999, active: false });
  const regionRef = useRef({ x: 0, y: 0, w: 0, h: 0 });
  const excludeRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W = 0, H = 0;
    const DPR = Math.min(window.devicePixelRatio || 1, 2);

    const computeRegion = () => {
      const cr = canvas.getBoundingClientRect();
      const ar = anchorRef?.current?.getBoundingClientRect();
      const base = ar && ar.width > 0 && ar.height > 0
        ? { x: ar.left - cr.left, y: ar.top - cr.top, w: ar.width, h: ar.height }
        : { x: 0, y: 0, w: W, h: H };
      regionRef.current = {
        x: base.x + region.left * base.w, y: base.y + region.top * base.h,
        w: (region.right - region.left) * base.w, h: (region.bottom - region.top) * base.h,
      };
      excludeRef.current = excludeRegion ? {
        x: base.x + excludeRegion.left * base.w, y: base.y + excludeRegion.top * base.h,
        w: (excludeRegion.right - excludeRegion.left) * base.w,
        h: (excludeRegion.bottom - excludeRegion.top) * base.h,
      } : null;
    };

    const inExclude = (x, y) => {
      const e = excludeRef.current;
      return e ? x >= e.x && x <= e.x + e.w && y >= e.y && y <= e.y + e.h : false;
    };

    const initParticles = () => {
      const ps = [], r = regionRef.current;
      for (let i = 0; i < count; i++) {
        let x, y, attempts = 0;
        do {
          x = r.x + Math.pow(Math.random(), 0.6) * r.w;
          y = r.y + Math.pow(Math.random(), 1.2) * r.h;
        } while (inExclude(x, y) && ++attempts < 12);
        ps.push({ hx: x, hy: y, x, y, vx: 0, vy: 0,
          size: 0.8 + Math.pow(Math.random(), 3) * 4.2,
          phase: Math.random() * Math.PI * 2, phaseSpeed: 0.6 + Math.random() * 1.4,
          tint: Math.random(), seed: Math.random() * 1000 });
      }
      particlesRef.current = ps;
    };

    const resize = () => {
      const r = canvas.getBoundingClientRect();
      W = r.width; H = r.height;
      canvas.width = (W * DPR) | 0; canvas.height = (H * DPR) | 0;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      computeRegion();
      if (!particlesRef.current.length) initParticles();
    };
    resize();
    initParticles();

    const ro = new ResizeObserver(resize);
    ro.observe(canvas);
    if (anchorRef?.current) ro.observe(anchorRef.current);

    const onMove = e => { const cr = canvas.getBoundingClientRect(); cursorRef.current = { x: e.clientX - cr.left, y: e.clientY - cr.top, active: true }; };
    const onLeave = () => { cursorRef.current.active = false; };
    canvas.addEventListener('pointermove', onMove);
    canvas.addEventListener('pointerleave', onLeave);

    let last = performance.now();
    const tick = now => {
      const dt = Math.min(48, now - last); last = now;
      const t = now / 1000;
      ctx.clearRect(0, 0, W, H);
      ctx.globalCompositeOperation = 'lighter';
      const ps = particlesRef.current, cur = cursorRef.current, cR2 = cursorRadius * cursorRadius;

      for (let i = 0; i < ps.length; i++) {
        const p = ps[i];
        const tx = p.hx + Math.sin(t * 0.5 + p.seed) * 6;
        const ty = p.hy + Math.cos(t * 0.4 + p.seed * 1.2) * 4;
        let ax = (tx - p.x) * 0.012, ay = (ty - p.y) * 0.012;

        if (cur.active) {
          const dx = p.x - cur.x, dy = p.y - cur.y, d2 = dx*dx + dy*dy;
          if (d2 < cR2 && d2 > 1) {
            const d = Math.sqrt(d2), fall = 1 - d / cursorRadius, force = fall*fall*cursorStrength;
            ax += dx/d*force; ay += dy/d*force;
          }
        }

        const ex = excludeRef.current;
        if (ex) {
          const inside = p.x >= ex.x && p.x <= ex.x+ex.w && p.y >= ex.y && p.y <= ex.y+ex.h;
          if (inside) {
            const dL = p.x-ex.x, dR = ex.x+ex.w-p.x, dT = p.y-ex.y, dB = ex.y+ex.h-p.y;
            const m = Math.min(dL,dR,dT,dB);
            if (m===dL) ax-=1.6; else if (m===dR) ax+=1.6; else if (m===dT) ay-=1.6; else ay+=1.6;
          }
        }

        p.vx = (p.vx + ax) * 0.92; p.vy = (p.vy + ay) * 0.92;
        p.x += p.vx * (dt/16); p.y += p.vy * (dt/16);
        p.phase += p.phaseSpeed * dt / 1000;
        const twinkle = 0.55 + 0.45 * Math.sin(p.phase);

        if (ex && p.x>=ex.x && p.x<=ex.x+ex.w && p.y>=ex.y && p.y<=ex.y+ex.h) continue;

        const g = 220 + 30*(1-p.tint), b = 130 + 80*(1-p.tint), alpha = twinkle * 0.95;
        const haloR = p.size * 4.5;
        const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, haloR);
        grd.addColorStop(0, `rgba(255,${g|0},${b|0},${alpha*0.6})`);
        grd.addColorStop(0.4, `rgba(255,${(g*.85)|0},${(b*.65)|0},${alpha*0.18})`);
        grd.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(p.x, p.y, haloR, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = `rgba(255,${Math.min(255,(g+25))|0},${b|0},${Math.min(1,alpha*1.4)})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.6, p.size*0.65), 0, Math.PI*2); ctx.fill();

        if (p.size > 2.4) {
          const flare = p.size * 6 * twinkle;
          ctx.strokeStyle = `rgba(255,235,180,${alpha*0.45})`; ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(p.x-flare, p.y); ctx.lineTo(p.x+flare, p.y);
          ctx.moveTo(p.x, p.y-flare); ctx.lineTo(p.x, p.y+flare);
          ctx.stroke();
        }
      }
      rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);

    return () => {
      cancelAnimationFrame(rafRef.current); ro.disconnect();
      canvas.removeEventListener('pointermove', onMove);
      canvas.removeEventListener('pointerleave', onLeave);
    };
  }, [anchorRef, region.left, region.top, region.right, region.bottom, count, cursorRadius, cursorStrength,
      excludeRegion?.left, excludeRegion?.top, excludeRegion?.right, excludeRegion?.bottom]);

  return (
    <canvas ref={canvasRef} className={className}
      style={{ position: 'absolute', inset: 0, width: '100%', height: '100%',
               pointerEvents: 'auto', filter: 'blur(0.3px) saturate(1.1)', ...style }} />
  );
}

  const [val, setVal] = React.useState(0);

  React.useEffect(() => {

    if (from === target) return;
    const startTime = performance.now();
    const duration = 720;
    let raf;
    const tick = (now) => {
      const t = Math.min((now - startTime) / duration, 1);
      const eased = 1 - Math.pow(1 - t, 3);

      fromRef.current = current;

      if (t < 1) raf = requestAnimationFrame(tick);

    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target]);
  return val;

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const TIMES = ['9:00','10:30','13:00','15:30'];

function CalendarPicker({ accent, calUrl }) {
  const today = new Date();
  const [year, setYear]     = React.useState(today.getFullYear());
  const [month, setMonth]   = React.useState(today.getMonth());
  const [selDay, setSelDay] = React.useState(null);
  const [selTime, setSelTime] = React.useState(null);

  const prevMonth = () => {
    if (month === 0) { setMonth(11); setYear(y => y - 1); }
    else setMonth(m => m - 1);
    setSelDay(null); setSelTime(null);
  };
  const nextMonth = () => {
    if (month === 11) { setMonth(0); setYear(y => y + 1); }
    else setMonth(m => m + 1);
    setSelDay(null); setSelTime(null);
  };

  // First weekday of month (0=Mon … 6=Sun, JS gives 0=Sun so adjust)
  const firstDow = (new Date(year, month, 1).getDay() + 6) % 7;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const isCurrentMonth = year === today.getFullYear() && month === today.getMonth();

  const isBookable = (day) => {
    if (isCurrentMonth && day <= today.getDate()) return false;
    const dow = new Date(year, month, day).getDay();
    // Available Mon (1), Wed (3), Fri (5) only
    return dow === 1 || dow === 3 || dow === 5;
  };

  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  return (
    <div style={{ position: 'relative' }}>
      <div className="liquid-glass" style={{ borderRadius: 22, padding: 28 }}>
        {/* Month header */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
          <span style={{ fontFamily: 'var(--serif)', fontSize: 22 }}>{MONTH_NAMES[month]} {year}</span>
          <span style={{ display: 'flex', gap: 6 }}>
            <button onClick={prevMonth} className="liquid-glass"
              style={{ width: 28, height: 28, borderRadius: 999, color: 'var(--ink)', cursor: 'pointer', border: 'none', fontSize: 16 }}>‹</button>
            <button onClick={nextMonth} className="liquid-glass"
              style={{ width: 28, height: 28, borderRadius: 999, color: 'var(--ink)', cursor: 'pointer', border: 'none', fontSize: 16 }}>›</button>
          </span>
        </div>

        {/* Day-of-week headers */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4, fontSize: 12 }}>
          {['M','T','W','T','F','S','S'].map((d, i) => (
            <div key={i} style={{ textAlign: 'center', color: 'var(--ink-mute)', padding: '6px 0' }}>{d}</div>
          ))}

          {/* Day cells */}
          {cells.map((day, i) => {
            if (!day) return <div key={`e${i}`} />;
            const bookable = isBookable(day);
            const selected = selDay === day;
            return (
              <div key={day}
                onClick={() => bookable && (setSelDay(day), setSelTime(null))}
                style={{
                  textAlign: 'center', padding: '8px 0', borderRadius: 8,
                  cursor: bookable ? 'pointer' : 'default',
                  color: bookable ? 'var(--ink)' : 'var(--ink-mute)',
                  background: selected ? `${accent}25` : bookable ? 'rgba(255,255,255,0.03)' : 'transparent',
                  border: selected ? `1px solid ${accent}` : '1px solid transparent',
                  fontVariantNumeric: 'tabular-nums',
                  transition: 'background .15s, border-color .15s',
                }}>{day}</div>
            );
          })}
        </div>

        {/* Time slots — only shown after a date is picked */}
        {selDay && (
          <div style={{ marginTop: 18, display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {TIMES.map(t => {
              const active = selTime === t;
              return (
                <button key={t} onClick={() => setSelTime(t)}
                  style={{
                    borderRadius: 999, padding: '8px 14px', fontSize: 12,
                    fontFamily: 'var(--mono)', cursor: 'pointer', border: 'none',
                    color: active ? '#0a0810' : 'var(--ink)',
                    background: active ? accent : 'rgba(255,255,255,0.06)',
                    transition: 'background .15s, color .15s',
                  }}>{t}</button>
              );
            })}
          </div>
        )}
      </div>

      {(() => {
        const mm = String(month + 1).padStart(2, '0');
        const dd = String(selDay).padStart(2, '0');
        const dateStr = selDay ? `${year}-${mm}-${dd}` : '';
        const href = selDay
          ? `${calUrl}?month=${year}-${mm}&date=${dateStr}`
          : calUrl;
        return (
          <a href={href} target="_blank" rel="noreferrer" className="liquid-glass pill"
            style={{
              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
              marginTop: 14, width: '100%', textDecoration: 'none',
              opacity: selDay ? 1 : 0.5,
              transition: 'opacity .2s',
            }}>
            {selDay
              ? `Check availability for ${MONTH_NAMES[month].slice(0,3)} ${selDay}`
              : 'Pick a date above'}
            <Icon.ArrowRight size={14} />
          </a>
        );
      })()}
    </div>
  );
}

      {/* ── REVENUE LEAK DETECTOR ── */}
      <section id="revenue-leak" style={{ padding: '60px 24px 120px', position: 'relative' }}>
        <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', background: 'radial-gradient(ellipse at center, rgba(255,255,255,0.018) 0%, transparent 60%)' }} />
        <RevenueLeakDetector accent={accent} />
      </section>

      {/* ── RESUME ── */}
      <section id="resume" style={{ padding: '60px 24px 120px' }}>
        <div style={{ maxWidth: 1080, margin: '0 auto' }}>
          <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 24, flexWrap: 'wrap', marginBottom: 64 }}>
            <FadeUp as="h2" style={{ fontFamily: 'var(--serif)', fontWeight: 400, fontSize: 'clamp(36px, 5.5vw, 72px)', letterSpacing: '-0.02em', margin: 0, lineHeight: 1.05 }}>
              <em style={{ color: 'var(--ink-dim)' }}>A short </em>résumé.
            </FadeUp>
            <FadeUp delay={100} className="eyebrow">Selected roles</FadeUp>
          </div>
          <div>
            {RESUME.map((r, i) => (
              <FadeUp key={i} delay={i * 80} className="resume-grid" style={{
                display: 'grid', gridTemplateColumns: '180px 1fr auto', gap: 24,
                padding: '24px 0', borderTop: '1px solid var(--ink-faint)', alignItems: 'baseline',
              }}>
                <span className="eyebrow">{r.year}</span>
                <div style={{ fontFamily: 'var(--serif)', fontSize: 30, lineHeight: 1.15, letterSpacing: '-0.01em' }}>
                  {r.role}<span style={{ color: 'var(--ink-mute)' }}> · {r.org}</span>
                </div>
                <span style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--ink-mute)', letterSpacing: '0.1em' }}>0{i+1}</span>
              </FadeUp>
            ))}
            <div style={{ borderTop: '1px solid var(--ink-faint)' }} />
          </div>
        </div>
      </section>

      {/* ── BOOK ── */}
      <section id="book" style={{ padding: '60px 24px 100px' }}>
        <div style={{ maxWidth: 1080, margin: '0 auto' }}>
          <FadeUp className="liquid-glass book-grid" style={{
            borderRadius: 32, padding: 'clamp(32px, 5vw, 72px)',
            display: 'grid', gridTemplateColumns: '1.2fr 1fr', gap: 48, alignItems: 'center',
            position: 'relative', overflow: 'hidden',
          }}>
            <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none',
              background: `radial-gradient(ellipse 80% 60% at 100% 100%, ${accent}30 0%, transparent 60%)` }} />
            <div style={{ position: 'relative' }}>
              <div className="eyebrow" style={{ marginBottom: 16 }}>Let's connect</div>
              <h2 style={{ fontFamily: 'var(--serif)', fontWeight: 400, fontSize: 'clamp(36px, 5vw, 64px)', letterSpacing: '-0.02em', margin: 0, lineHeight: 1.05 }}>
                Let's <em style={{ color: 'var(--ink-dim)' }}>connect</em>.
              </h2>
              <p style={{ margin: '24px 0 0', color: 'var(--ink-dim)', fontSize: 16, lineHeight: 1.7, maxWidth: 520 }}>
                I enjoy meeting ambitious people and learning what they're building.
              </p>
              <p style={{ margin: '14px 0 0', color: 'var(--ink-dim)', fontSize: 15, lineHeight: 1.7, maxWidth: 520 }}>
                Whether you're a new graduate looking for career advice, a company scaling its revenue engine, or a CEO exploring AI-driven GTM efficiency — I'm always open to meaningful conversations.
              </p>
              <div style={{ marginTop: 28, padding: '18px 22px', borderLeft: `2px solid ${accent}`, background: `linear-gradient(90deg, ${accent}10 0%, transparent 80%)`, borderRadius: '0 12px 12px 0', fontSize: 14, lineHeight: 1.65, color: 'var(--ink-dim)', maxWidth: 520 }}>
                <span style={{ color: 'var(--ink)', fontWeight: 500 }}>One small ask:</span>{' '}
                if you're reaching out to sell me software, please consider donating to{' '}
                <a href="https://donate.sunnybrook.ca" target="_blank" rel="noreferrer" className="link" style={{ color: accent, fontWeight: 500 }}>
                  Sunnybrook Health Sciences Centre
                </a>{' '}cancer research first.
              </div>
            </div>
            <CalendarPicker accent={accent} calUrl={CONTACT.cal} />
          </FadeUp>
        </div>
      </section>

      {/* ── FOOTER ── */}
      <section id="contact" style={{ padding: '80px 24px 60px', borderTop: '1px solid var(--ink-faint)', position: 'relative' }}>
        <div style={{ maxWidth: 1180, margin: '0 auto' }}>
          <div className="footer-grid" style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr 1fr 1fr', gap: 40, alignItems: 'flex-start' }}>
            <div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 16 }}>
                <span style={{ width: 24, height: 24, borderRadius: 999, background: `radial-gradient(circle at 30% 30%, ${accent}, #6b3a1f 70%)`, boxShadow: `0 0 12px ${accent}80` }} />
                <span style={{ fontWeight: 600, fontSize: 16 }}>richdang.ai</span>
              </div>
              <p style={{ color: 'var(--ink-mute)', fontSize: 13, lineHeight: 1.6, maxWidth: 320, margin: 0 }}>
                AI GTM operator. Currently shipping agents, pipelines, and revenue systems from the warm side of the country.
              </p>
            </div>
            <div>
              <div className="eyebrow" style={{ marginBottom: 14 }}>Contact</div>
              <a className="link" href={`mailto:${CONTACT.email}`} style={{ display: 'block', fontSize: 14, marginBottom: 8 }}>{CONTACT.email}</a>
            </div>
            <div>
              <div className="eyebrow" style={{ marginBottom: 14 }}>Social</div>
              <a className="link" href={CONTACT.linkedin} target="_blank" rel="noreferrer" style={{ display: 'block', fontSize: 14, marginBottom: 8 }}>LinkedIn</a>
              <a className="link" href={CONTACT.github}   target="_blank" rel="noreferrer" style={{ display: 'block', fontSize: 14 }}>GitHub</a>
            </div>
            <div>
              <div className="eyebrow" style={{ marginBottom: 14 }}>Site</div>
              <a className="link" href="#skills" style={{ display: 'block', fontSize: 14, marginBottom: 8 }}>Skills</a>
              <a className="link" href="#resume" style={{ display: 'block', fontSize: 14, marginBottom: 8 }}>Résumé</a>
              <a className="link" href="#book"   style={{ display: 'block', fontSize: 14 }}>Book a meeting</a>
            </div>
          </div>
          <div style={{ marginTop: 60, paddingTop: 24, borderTop: '1px solid var(--ink-faint)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--ink-mute)', letterSpacing: '0.05em', flexWrap: 'wrap', gap: 8 }}>
            <span>© 2026 RICH DANG</span>
            <span>BUILT WITH CLAUDE · TYPESET IN INSTRUMENT SERIF</span>
          </div>
        </div>
      </section>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<VariantA accent="#ffa45a" />);
  </script>
</body>
</html>
